<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA カスタムアラーム</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #4c1d95;
            --slider-color:  #4c1d95;
            --slider2-color:  #008000;
            --bg-color: #f8fafc;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; background: var(--bg-color); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .clock { font-size: 3rem; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 25px; color: var(--primary-color); }

        .weekday-group {
            max-width: 100%;      
            margin: 20px auto;  
            background-color: #bcd7f5;
            border: 2px solid #cbd5e1;
            border-radius: 12px;   
            padding: 20px 20px 20px 0px;    
            box-shadow: 0 4px 10px rgba(2,132,199,0.8); 
            box-sizing: border-box;
            
            /* 👇 ここにこの1行を追加します！ */
            text-align: center;
        }
        
        /* アラームアイテム */
        .alarm-item { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.5) }
        .alarm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; }
        
        /* 入力エリア */
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        input[type="date"], input[type="time"], .sec-input { font-size: 1rem; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; background: white; }
        .sec-input { width: 50px; text-align: center; }
        
        /* ファイル選択 */
        .file-input-label { font-size: 0.85rem; display: block; margin-top: 5px; color: #64748b; }
        .file-name { font-size: 0.85rem; color: #0284c7; font-weight: bold; margin-left: 5px; }

        /* トグルスイッチ */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        .slider2 { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 24px; }
        .slider2:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--slider-color); }
        input:checked + .slider:before { transform: translateX(22px); }
        input:checked + .slider2 { background-color: var(--slider2-color); }
        input:checked + .slider2:before { transform: translateX(22px); }

        /* 停止ボタン */
        .stop-btn { display: none; width: 100%; background: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 15px; cursor: pointer; box-shadow: 0 10px 10px rgba(255,0,0,1);}
        
        /* ビデオ要素 */
        video { display: none; width: 100%; max-height: 240px; margin-top: 15px; border-radius: 8px; background: black; }

        /* ★追加：環境表示メッセージ用のスタイル（お好みで調整してください） */
        .env-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: #e2e8f0;
            color: #475569;
        }

        /* 元のファイル選択ボタンを完全に隠す */
        .custom-file-btn input[type="file"] {
            display: none;
        }

        /* 代わりのボタンのデザイン */
        .custom-file-btn {
            display: inline-block;
            padding: 5px 20px;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        /* ホバーしたときの動き */
        .custom-file-btn:hover {
            background-color: #0056b3;
        }

        .alarm-custom-file-btn input[type="file"] {
            display: none;
        }

        .alarm-custom-file-btn {
            display: inline-block;
            padding: 5px 20px;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .alarm-custom-file-btn:hover {
            background-color: #0056b3;
        }
        .parent-box {
            display: 50px;    /* 不正な 10px から修正 */
            gap: 5px;          /* 箱と箱の間のすき間 */
            background-color: #5c5c5c;
        }
        /* ① PC向けの表示（デフォルト） */
        .sp-only { position: absolute; top: 50%; left: 50%; transform: translateX(-2.3%); width: 320px; border: 1px solid #cbd5e1; background: white; z-index: 100; display: flex; justify-content: space-around; padding: 8px 5px; Margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); box-sizing: border-box; border-radius: 4px; }
        .sp-only1 { font-size: 1.9rem; text-align: center; font-weight: 8px; padding-top: 11px; margin-right: 90px; }
        .sp-only2 { background: white; border: 1px solid #cbd5e1; border-radius: 6px; margin: 17px 5px 1px 10px; width: 51px; height: 30px; cursor: pointer; }
        .sp-only3 { font-weight: bold; font-size: 1.6rem; border: 1px solid #cbd5e1; border-radius: 6px; margin: 18px 0px 5px 1px; width: 30px; text-align: center; height: 25px; padding-top: 3px; cursor: pointer; }
        .sp-only4 { margin: 0; font-weight: bold; font-size: 0.9rem; width: 100%; text-align: center; margin-bottom: 100px; margin-right: 20px; }
        .sp-only5 { align-items: center; height: 25px; margin-top: -4px; margin-right: -2px; justify-content: center; font-weight: bold; font-size: 1.5rem; list-style: none; }
        .sp-only6 { font-size: 1.9rem; text-align: center; font-weight: 8px; padding-top: 11px; }
        .a { margin-left: 50px; }
        .b { margin-left: -1px; padding-top: 11px; margin-right: 10px; }
        .c { margin-left: 26px; }
        
        @media screen and (min-width: 479px) and (max-width: 768px) {
            .sp-only2 { margin-top: 14px; }
            .sp-only3{ margin-top: 14px; height: 19px; padding-top: 7px; }
            .a { margin-left: 40px; }
        }
            
        /* ② スマホ向けの表示（画面の横幅が768px以下の場合） */
        @media screen and (max-width: 479px) {
            .sp-only { transform: translateX(-16%); margin-top: 20px; }
            .sp-only1 { margin-right: 5px; font-size: 1.1rem; padding-top: 15px; width: 15px; }
            .sp-only2 { margin: 14px -10px 1px 10px; height: 21px; padding-left: 1px; width: 30px; }
            .sp-only3 { margin: 14px 0px 5px 20px; height: 9px; width: 19px; padding-top: 6px; font-size: 1.1rem; }
            .sp-only4 { margin-right: 0; margin-left: 16px; }
            .sp-only5 { width: 30px; height: 9px; font-size: 1rem; margin-left: 0px; margin-top: 0px; }
            .sp-only6 { font-size: 1.1rem; padding-top: 15px; margin-left: 0px; }
            .a { margin-left: -3px; }
            .b { margin-left: 0px; margin-right: 5px; }
            .c { height: 3px; width: 35px; margin-left: 5px; }
        }
        .no-spin::-webkit-outer-spin-button,
        .no-spin::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
  /* Firefox の矢印を消す */
        .no-spin {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="clock" id="clock">0000/00/00 00:00:00</div>
    
    <div id="env-container"></div>

    <div id="alarm-list"></div>
    
    <video id="alarm-video" style="display: none;" playsinline webpack-playsinline></video>
    <button id="stop-alarm-btn" class="stop-btn" onclick="stopCurrentMedia()">🚨 アラームを停止</button>
         <div class="weekday-group">
            <div class="toggle-section">
                <span class="sp-only4">アラームをかける通知の時間</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-${index}" ${alarm.active ? 'checked' : ''} onchange="toggleAlarm(${index}, this.checked)">
                    <span class="slider2"></span>
                </label>
            </div>
             
            <div style="display: flex; text-align: center; flex-wrap: wrap;">
                <div class="custom-select" style="position: relative; width: 36px; margin-left: 20px;">
                    <details class="sp-only2">
                        <summary class="sp-only5">曜日</summary>
                        <div class="parent-box">
                            <div class="sp-only">
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Sun">日</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Mon">月</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Tues">火</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Wednes">水</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Thurs">木</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Fri">金</label>
                                <label style="cursor: pointer; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; gap: 4px;"><input type="checkbox" name="youbi" value="Satur">土</label>
                            </div>
                        </div>
                    </details>
                </div>
     
    
                <label for="color-select" class="sp-only1 c">曜日</label>
                
                <input type="number" min="0" max="23" value="21" class="no-spin sp-only3">
                <label for="color-select" class="sp-only1 b">時</label>
    
                <input type="number" min="0" max="59" value="0" class="no-spin sp-only3 a">
                <label for="color-select" class="sp-only6">分</label>
            </div>
         </div>
        <div class="timer-group" style="background: #fef3c7; border: 2px dashed #f59e0b; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left;">
            <div class="alarm-header">
                <span>⏳ タイマー（カウントダウン）</span>
                <button id="timer-btn" onclick="toggleTimer()" style="background: #f59e0b; color: white; border: none; padding: 6px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">スタート</button>
            </div>
    
            <div class="time-inline" style="display: flex; align-items: center; gap: 5px; margin-top: 10px;">
                <input type="number" id="timer-min" min="0" max="180" value="3" style="font-size: 1rem; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 60px; text-align: center;"> 分
                <input type="number" id="timer-sec" min="0" max="59" value="0" style="font-size: 1rem; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; width: 60px; text-align: center;"> 秒
                <span id="timer-display" style="font-size: 1.2rem; font-weight: bold; color: #d97706; margin-left: auto; font-variant-numeric: tabular-nums;"></span>
            </div>
    
            <div style="margin-top: 10px;">
                <label class="file-input-label">
                    🎵 タイマー用音源: 
                    <label class="alarm-custom-file-btn">
                        ファイルを選択
                        <input type="file" accept="audio/*,video/*" onchange="handleTimerFileSelect(this)">
                    </label>
                    <span id="timer-filename" class="file-name">未設定</span>
                </label>
            </div>
        </div>
    </div>
</div>
<script>
    // ★追加：ページが読み込まれた時に、環境を判定して<p>を追加する関数
    function displayEnvironment() {
        const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const isMobile = window.innerWidth <= 768; // 画面幅768px以下をスマホとみなす

        const envContainer = document.getElementById('env-container');

        // 条件に応じて文章と見た目を分ける
        if (!isPWA && isMobile) {
            const p = document.createElement('p');
            p.className = 'env-badge';
            p.textContent = '「ホーム画面に追加」で追加しないと使えないよ！';
            p.style.background = '#c0c0c0';
            p.style.color = '#000000';
            envContainer.appendChild(p);
        }
    }

    // ★追加：関数の実行を登録（既存のコードの邪魔をしない場所に置きます）
    window.addEventListener('DOMContentLoaded', displayEnvironment);


    // --- 以下、既存のアラーム処理コード（そのまま） ---
    Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
            console.log('通知が許可されました！');
        }
    });

    let alarms = [
        { date: "", time: "", sec: "00", active: false, audioName: "未設定" },
        { date: "", time: "", sec: "00", active: false, audioName: "未設定" },
        { date: "", time: "", sec: "00", active: false, audioName: "未設定" },
        { date: "", time: "", sec: "00", active: false, audioName: "未設定" },
        { date: "", time: "", sec: "00", active: false, audioName: "未設定" }
    ];

    let currentAudio = null; 
    let currentVideo = document.getElementById('alarm-video');

    const DB_NAME = "AlarmMediaDB";
    const STORE_NAME = "mediaFiles";

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveMediaToDB(index, file) {
        try {
            const db = await openDB();
            const transaction = db.transaction(STORE_NAME, "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.put(file, `media_${index}`);
        } catch (err) {
            console.error("IndexedDBへの保存に失敗:", err);
            alert("ファイルの保存に失敗しました。");
        }
    }

    function getMediaFromDB(index) {
        return new Promise(async (resolve, reject) => {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_NAME, "readonly");
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get(`media_${index}`);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            } catch (err) {
                reject(err);
            }
        });
    }

    if (localStorage.getItem('pwa_alarms')) {
        const saved = JSON.parse(localStorage.getItem('pwa_alarms'));
        alarms = alarms.map((alarm, i) => saved[i] ? { ...alarm, ...saved[i], active: false } : alarm);
    }

    const alarmListContainer = document.getElementById('alarm-list');
    
    alarms.forEach((alarm, index) => {
        const item = document.createElement('div');
        item.className = 'alarm-item';
        item.innerHTML = `
            <div class="alarm-header">
                <span>⏰ アラーム ${index + 1}</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-${index}" ${alarm.active ? 'checked' : ''} onchange="toggleAlarm(${index}, this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="input-group">
                <input type="date" id="date-${index}" value="${alarm.date}" onchange="updateAlarm(${index}, 'date', this.value)">
                <input type="time" id="time-${index}" value="${alarm.time}" onchange="updateAlarm(${index}, 'time', this.value)">
                <input type="number" id="sec-${index}" class="sec-input" min="0" max="59" value="${alarm.sec}" onchange="updateAlarm(${index}, 'sec', this.value)">
                <span>秒</span>
            </div>
            <div>
                <label class="file-input-label">
                    🎵 音源/動画: 
                    <label class="custom-file-btn">
                        ファイルを選択
                        <input type="file" accept="audio/*,video/*" name="example" onchange="handleFileSelect(${index}, this)">
                    </label>
                    <span id="filename-${index}" class="file-name">${alarm.audioName}</span>
                </label>
            </div>
        `;
        alarmListContainer.appendChild(item);
    });

    function updateAlarm(index, key, value) {
        if (key === 'sec') {
            let s = parseInt(value, 10);
            if (isNaN(s) || s < 0 || s > 59) s = 0;
            value = String(s).padStart(2, '0');
            document.getElementById(`sec-${index}`).value = value;
        }
        alarms[index][key] = value;
        if (alarms[index].active) {
            alarms[index].active = false;
            document.getElementById(`toggle-${index}`).checked = false;
        }
        saveToStorage();
    }

    async function handleFileSelect(index, input) {
        const file = input.files[0];
        if (!file) return;

        alarms[index].audioName = file.name;
        document.getElementById(`filename-${index}`).innerText = file.name;
        saveToStorage();
        await saveMediaToDB(index, file);
    }

    function toggleAlarm(index, isChecked) {
        if (isChecked && !alarms[index].time) {
            alert("「時間」は必ず設定してください。");
            document.getElementById(`toggle-${index}`).checked = false;
            return;
        }
        alarms[index].active = isChecked;
        saveToStorage();

        if (isChecked) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            if (context.state === 'suspended') context.resume();
        }
    }

    function saveToStorage() {
        localStorage.setItem('pwa_alarms', JSON.stringify(alarms));
    }
// ==========================================
// ★ 追加：タイマー（カウントダウン）用ロジック
// ==========================================
    let timerEndTime = null; // タイマーが終了する未来の時刻（ミリ秒）
    let timerIntervalId = null; // カウントダウン表示用のインターバルID
    let timerAudioName = "未設定";

    // ページ読み込み時にタイマー音源の名前だけ復元
    window.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('pwa_timer_audio_name')) {
            timerAudioName = localStorage.getItem('pwa_timer_audio_name');
            document.getElementById('timer-filename').innerText = timerAudioName;
        }
    });

// タイマー用ファイル選択
    async function handleTimerFileSelect(input) {
        const file = input.files[0];
        if (!file) return;

        timerAudioName = file.name;
        document.getElementById('timer-filename').innerText = file.name;
        localStorage.setItem('pwa_timer_audio_name', file.name);
        // IndexedDBのキー「media_timer」に保存
        await saveMediaToDB('timer', file);
    }

// タイマーの開始・停止切り替え
    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        const display = document.getElementById('timer-display');

    // すでに動いている場合は「キャンセル（停止）」
        if (timerIntervalId) {
            clearInterval(timerIntervalId);
            timerIntervalId = null;
            timerEndTime = null;
            btn.innerText = "スタート";
            btn.style.background = "#f59e0b";
            display.innerText = "";
            return;
        }

    // 入力値の取得
        const min = parseInt(document.getElementById('timer-min').value, 10) || 0;
        const sec = parseInt(document.getElementById('timer-sec').value, 10) || 0;
        const totalMs = ((min * 60) + sec) * 1000;

        if (totalMs <= 0) {
            alert("時間を設定してください。");
            return;
        }

    // iOS/Android対策：ユーザー操作をトリガーにAudioContextを解放
        const context = new (window.AudioContext || window.webkitAudioContext)();
        if (context.state === 'suspended') context.resume();

    // 現在時刻に設定時間を足して「終了時刻」を固定する
        timerEndTime = Date.now() + totalMs;
        btn.innerText = "キャンセル";
        btn.style.background = "#64748b";

    // 画面のカウントダウン表示を更新するループ（ミリ秒単位で正確に計算）
        timerIntervalId = setInterval(() => {
            const remainingMs = timerEndTime - Date.now();

            if (remainingMs <= 0) {
            // タイマー終了時の処理
                clearInterval(timerIntervalId);
                timerIntervalId = null;
                timerEndTime = null;
                btn.innerText = "スタート";
                btn.style.background = "#f59e0b";
                display.innerText = "タイムアップ！";

            // アラーム鳴動処理を呼び出す（引数に 'timer' を指定）
                triggerAlarmNotification(`⏳ タイマー終了`, 'timer');
            } else {
            // 残り時間の表示更新
                const rMin = Math.floor(remainingMs / 1000 / 60);
                const rSec = Math.floor((remainingMs / 1000) % 60);
                display.innerText = `残り ${String(rMin).padStart(2, '0')}:${String(rSec).padStart(2, '0')}`;
            }
        }, 250); // 画面更新は0.25秒ごと
    }
    
    function stopCurrentMedia() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (currentVideo) {
            currentVideo.pause();
            currentVideo.src = "";
            currentVideo.style.display = 'none';
        }
        document.getElementById('stop-alarm-btn').style.display = 'none';
    }

    setInterval(async () => {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');

        const currentDateStr = `${yyyy}-${mm}-${dd}`;
        const currentTimeStr = `${hh}:${min}:${ss}`;

        document.getElementById('clock').innerText = `${yyyy}/${mm}/${dd} ${hh}:${min}:${ss}`;

        for (let index = 0; index < alarms.length; index++) {
            const alarm = alarms[index];
            if (!alarm.active) continue;

            let isTrigger = false;
            if (alarm.date) {
                if (alarm.date === currentDateStr && alarm.time + ":" + alarm.sec === currentTimeStr) isTrigger = true;
            } else {
                if (alarm.time + ":" + alarm.sec === currentTimeStr) isTrigger = true;
            }

            if (isTrigger) {
                document.getElementById(`toggle-${index}`).checked = false;
                alarm.active = false;
                saveToStorage();

                if (Notification.permission === 'granted') {
                    navigator.serviceWorker.ready.then(registration => {
                        registration.showNotification(`⏰ アラーム ${index + 1}`, {
                            body: `アラームです！アプリを開いてアラームを消しよう！`,
                            icon: 'icon-192.png',
                            tag: 'alarm-notification',
                            renotify: true
                        });
                    });
                }

                const fileBlob = await getMediaFromDB(index);

                if (fileBlob) {
                    stopCurrentMedia();
                    const mediaUrl = URL.createObjectURL(fileBlob);
                    currentAudio = new Audio(mediaUrl);
                    currentAudio.loop = true;
                    currentAudio.play().catch(err => {
                        console.error("再生制限: ", err);
                        alert(`⏰ アラーム ${index + 1} の時間です！\n(※画面をタップすると音が鳴ります)`);
                    });
                    document.getElementById('stop-alarm-btn').style.display = 'block';
                } else {
                    alert(`⏰ アラーム ${index + 1} の時間です！(ファイルが見つかりません)`);
                }
            }
        }
    }, 1000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
    }
</script>
</body>
</html>
