<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA 精密日時アラーム</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #e63946;
            --bg-color: #f8f9fa;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; text-align: center; background: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .clock { font-size: 2.8rem; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 25px; color: #1d3557; }
        
        /* アラームリスト */
        .alarm-item { background: #f1faee; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .alarm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-weight: bold; color: #457b9d; }
        
        /* 入力エリアのレイアウト */
        .input-group { display: flex; gap: 8px; justify-content: center; align-items: center; }
        input[type="date"], input[type="time"], .sec-input { font-size: 1rem; padding: 8px; border: 1px solid #ccc; border-radius: 6px; background: white; }
        .sec-input { width: 50px; text-align: center; }
        
        /* トグルスイッチ */
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

<div class="container">
    <!-- 現在の「年月日 時分秒」を表示 -->
    <div class="clock" id="clock">0000/00/00 00:00:00</div>

    <!-- アラーム5個の入力欄 -->
    <div id="alarm-list"></div>
</div>

<script>
    // 5つのアラームの状態（日付、時間、秒、有効フラグ）
    let alarms = [
        { date: "", time: "", sec: "00", active: false },
        { date: "", time: "", sec: "00", active: false },
        { date: "", time: "", sec: "00", active: false },
        { date: "", time: "", sec: "00", active: false },
        { date: "", time: "", sec: "00", active: false }
    ];

    // 画面に入力項目を生成
    const alarmListContainer = document.getElementById('alarm-list');
    alarms.forEach((alarm, index) => {
        const item = document.createElement('div');
        item.className = 'alarm-item';
        item.innerHTML = `
            <div class="alarm-header">
                <span>⏰ アラーム ${index + 1}</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-${index}" onchange="toggleAlarm(${index}, this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="input-group">
                <input type="date" id="date-${index}" onchange="updateAlarm(${index}, 'date', this.value)">
                <input type="time" id="time-${index}" onchange="updateAlarm(${index}, 'time', this.value)">
                <input type="number" id="sec-${index}" class="sec-input" min="0" max="59" value="00" placeholder="秒" onchange="updateAlarm(${index}, 'sec', this.value)">
                <span>秒</span>
            </div>
        `;
        alarmListContainer.appendChild(item);
    });

    // 入力値を配列に反映する関数
    // 「秒」が空欄か不正な値なら自動で "00" に補完します
    function updateAlarm(index, key, value) {
        if (key === 'sec') {
            let s = parseInt(value, 10);
            if (isNaN(s) || s < 0 || s > 59) s = 0;
            value = String(s).padStart(2, '0');
            document.getElementById(`sec-${index}`).value = value;
        }
        alarms[index][key] = value;
    }

    // スイッチの切り替え処理
    function toggleAlarm(index, isChecked) {
        alarms[index].active = isChecked;
        if (isChecked && !alarms[index].time) {
            alert("「時間（時:分）」は必ず設定してください。");
            document.getElementById(`toggle-${index}`).checked = false;
            alarms[index].active = false;
        }
    }

    // メインのタイマーループ（1秒ごとに実行）
    setInterval(() => {
        const now = new Date();
        
        // 現在時刻のパーツを個別に取得（1桁の時は0埋め）
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const hh = String(now.getHours()).padStart(2, '0');
        const min = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');

        // 時計表示の更新
        document.getElementById('clock').innerText = `${yyyy}/${mm}/${dd} ${hh}:${min}:${ss}`;

        // 5つのアラームをチェック
        alarms.forEach((alarm, index) => {
            if (!alarm.active) return; // オフならスキップ

            // 1. 日付の判定（空欄なら「今日の年月日」にする）
            let targetDate = alarm.date; 
            if (!targetDate) {
                targetDate = `${yyyy}-${mm}-${dd}`; // フォームの「YYYY-MM-DD」形式に合わせる
            }

            // 2. 時間のパース（"14:35" などを "14" と "35" に分解）
            const [alarmH, alarmM] = alarm.time.split(':');

            // 3. 現在時刻と、設定（または補完された）日時が「秒」まで完全一致するか判定
            const currentAlarmDate = `${yyyy}-${mm}-${dd}`;
            
            if (
                targetDate === currentAlarmDate && 
                hh === alarmH && 
                min === alarmM && 
                ss === alarm.sec
            ) {
                // 条件が一致したらアラーム発動！
                alert(`⏰ アラーム ${index + 1} の時間です！\n設定: ${targetDate} ${alarm.time}:${alarm.sec}`);
                
                // 鳴り終わったら自動でスイッチをオフにする
                document.getElementById(`toggle-${index}`).checked = false;
                alarm.active = false;
            }
        });
    }, 1000);

    // ─── PWA用 サービスワーカー登録 ───
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker 登録完了'))
            .catch(err => console.error('Service Worker 登録失敗', err));
    }
</script>
</body>
</html>
