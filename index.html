<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アラーム</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .clock { font-size: 3.5rem; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 30px; color: #222; }
        
        /* アラームリストのスタイル */
        .alarm-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; }
        .alarm-item:last-child { border-bottom: none; }
        .alarm-number { font-weight: bold; color: #666; }
        input[type="time"] { font-size: 1.2rem; padding: 5px; border: 1px solid #ccc; border-radius: 5px; }
        
        /* トグルスイッチのスタイル */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="container">
    <!-- 現在時刻表示 -->
    <div class="clock" id="clock">00:00:00</div>

    <!-- アラーム5個の入力欄 -->
    <div id="alarm-list"></div>
</div>

<script>
    // 5つのアラームの状態を管理する配列
    let alarms = [
        { time: "", active: false },
        { time: "", active: false },
        { time: "", active: false },
        { time: "", active: false },
        { time: "", active: false }
    ];

    // 画面に5つのアラーム入力欄を生成
    const alarmListContainer = document.getElementById('alarm-list');
    alarms.forEach((alarm, index) => {
        const item = document.createElement('div');
        item.className = 'alarm-item';
        item.innerHTML = `
            <span class="alarm-number">${index + 1}</span>
            <input type="time" id="time-${index}" onchange="updateAlarmTime(${index}, this.value)">
            <label class="switch">
                <input type="checkbox" id="toggle-${index}" onchange="toggleAlarm(${index}, this.checked)">
                <span class="slider"></span>
            </label>
        `;
        alarmListContainer.appendChild(item);
    });

    // 時間が変更されたとき
    function updateAlarmTime(index, value) {
        alarms[index].time = value;
    }

    // スイッチが切り替わったとき
    function toggleAlarm(index, isChecked) {
        alarms[index].active = isChecked;
        if (isChecked && !alarms[index].time) {
            alert("時間を設定してください");
            document.getElementById(`toggle-${index}`).checked = false;
            alarms[index].active = false;
        }
    }

    // 1秒ごとに時計の更新とアラームの判定を行う
    setInterval(() => {
        const now = new Date();
        const timeStr = now.toTimeString().split(' ')[0]; // "14:35:01" のような文字列
        document.getElementById('clock').innerText = timeStr;

        const currentHM = timeStr.substring(0, 5); // 秒を省いた "14:35"

        // 5つのアラームをループでチェック
        alarms.forEach((alarm, index) => {
            // 有効かつ、設定時間と現在時刻（時:分）が一致し、秒が「00」の瞬間に実行
            if (alarm.active && alarm.time === currentHM && timeStr.endsWith('00')) {
                alert(`⏰ アラーム ${index + 1} の時間です！ (${alarm.time})`);
                
                // 鳴ったら自動でスイッチをオフにする場合
                document.getElementById(`toggle-${index}`).checked = false;
                alarm.active = false;
            }
        });
    }, 1000);

    // ─── PWA用 サービスワーカー登録 ───
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker 登録完了'))
            .catch(err => console.error('Service Worker 登録失敗', err));
    }
</script>
</body>
</html>
